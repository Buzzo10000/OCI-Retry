name: OCI Instance Retry

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh > install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/lib/oracle-cli/bin" >> $GITHUB_PATH
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          export PATH="$HOME/lib/oracle-cli/bin:$HOME/bin:$PATH"
          oci --version
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config

      - name: Check if instance already exists
        id: check
        run: |
          echo "exists=false" >> $GITHUB_OUTPUT

      - name: Attempt instance creation
        if: steps.check.outputs.exists == 'false'
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          export PATH="$HOME/lib/oracle-cli/bin:$HOME/bin:$PATH"
          echo "${{ secrets.SSH_PUBLIC_KEY }}" | base64 -d > /tmp/ssh_key.pub

          COMPARTMENT="${{ secrets.OCI_TENANCY_OCID }}"
          IMAGE="ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq"
          SUBNET="ocid1.subnet.oc1.uk-london-1.aaaaaaaaxws72obbnue5sypijv4gfmlsg26kcl5ak3aackv7uvztaxccsz5q"

          AVAILABILITY_DOMAINS=(
            "QHpL:UK-LONDON-1-AD-1"
            "QHpL:UK-LONDON-1-AD-2"
            "QHpL:UK-LONDON-1-AD-3"
          )

          for AD in "${AVAILABILITY_DOMAINS[@]}"; do
            echo "Trying $AD..."
            RESULT=$(oci compute instance launch \
              --availability-domain "$AD" \
              --compartment-id "$COMPARTMENT" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
              --image-id "$IMAGE" \
              --subnet-id "$SUBNET" \
              --assign-public-ip true \
              --display-name "ollama-server" \
              --boot-volume-size-in-gbs 60 \
              --ssh-authorized-keys-file /tmp/ssh_key.pub \
              2>&1) || true

            echo "Response from $AD: $RESULT"

            if echo "$RESULT" | grep -q '"lifecycle-state"'; then
              echo "✅ SUCCESS in $AD!"
              echo "$RESULT" | grep -E '"id"|"lifecycle-state"|"public-ip"'
              exit 0
            else
              echo "❌ No capacity in $AD"
            fi
          done

          echo "No capacity found this run — will retry in 5 minutes"
          exit 0

      - name: Instance already exists
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "✅ Instance is already running — disable this workflow in GitHub Actions"
